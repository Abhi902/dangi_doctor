name: dangi_doctor
description: >-
  Flutter app health CLI — crawls every screen via the Dart VM service,
  analyses widget trees, measures performance, detects known bugs, and
  generates integration test scripts automatically.
version: 0.2.0
repository: https://github.com/Abhi902/dangi_doctor
homepage: https://github.com/Abhi902/dangi_doctor
issue_tracker: https://github.com/Abhi902/dangi_doctor/issues

topics:
  - flutter
  - testing
  - cli
  - performance
  - analysis

environment:
  sdk: ">=3.0.0 <4.0.0"

executables:
  dangi_doctor: dangi_doctor

dependencies:
  args: ^2.4.0
  http: ^1.2.0
  path: ^1.9.0
  vm_service: ^14.0.0
  yaml: ^3.1.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
